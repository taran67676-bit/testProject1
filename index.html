<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<style>
:root{
    --primary:#2563eb;
    --danger:#ef4444;
    --success:#10b981;
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#1e293b;
    --muted:#64748b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    margin-bottom:30px;
}

.header h1{
    font-size:2rem;
}

.header p{
    color:var(--muted);
    margin-top:5px;
}

.cart-layout{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

.cart-items{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.cart-card{
    background:var(--card);
    border-radius:16px;
    padding:18px;
    display:flex;
    gap:20px;
    align-items:center;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.product-image{
    width:120px;
    height:120px;
    object-fit:contain;
}

.product-info{
    flex:1;
}

.product-title{
    font-size:1rem;
    font-weight:600;
    margin-bottom:10px;
}

.product-category{
    color:var(--muted);
    font-size:.9rem;
    margin-bottom:10px;
}

.product-price{
    font-size:1.2rem;
    font-weight:bold;
    color:var(--success);
}

.actions{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:15px;
}

.quantity-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.quantity-box button{
    width:32px;
    height:32px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:white;
    cursor:pointer;
    font-size:18px;
}

.quantity-box span{
    min-width:20px;
    text-align:center;
    font-weight:600;
}

.remove-btn{
    border:none;
    background:var(--danger);
    color:white;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

.summary{
    background:var(--card);
    border-radius:16px;
    padding:24px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    height:fit-content;
    position:sticky;
    top:20px;
}

.summary h2{
    margin-bottom:20px;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.summary-total{
    border-top:1px solid #e2e8f0;
    margin-top:15px;
    padding-top:15px;
    font-size:1.2rem;
    font-weight:bold;
}

.checkout-btn{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--primary);
    color:white;
    font-size:1rem;
    cursor:pointer;
}

.checkout-btn:hover{
    opacity:.9;
}

.loading,
.empty{
    background:white;
    padding:50px;
    text-align:center;
    border-radius:16px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

@media(max-width:900px){

    .cart-layout{
        grid-template-columns:1fr;
    }

    .cart-card{
        flex-direction:column;
        text-align:center;
    }

    .actions{
        align-items:center;
    }

    .summary{
        position:static;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🛒 Shopping Cart</h1>
        <p>Manage your products and checkout.</p>
    </div>

    <div id="app">
        <div class="loading">Loading products...</div>
    </div>

</div>

<script>
let cartItems = JSON.parse(localStorage.getItem("cart")) || [];

async function loadProducts() {
    try {
        const response = await fetch("https://fakestoreapi.com/products");
        const products = await response.json();

        // Only initialize if cart is empty
        if (cartItems.length === 0) {
            cartItems = products.slice(0, 5).map(product => ({
                ...product,
                quantity: 1
            }));
            saveCart();
        }

        renderCart();

    } catch (error) {
        document.getElementById("app").innerHTML = `
            <div class="empty">
                Failed to load products.
            </div>
        `;
        console.error(error);
    }
}

function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cartItems));
}

function renderCart() {
    const app = document.getElementById("app");

    if (cartItems.length === 0) {
        app.innerHTML = `
            <div class="empty">
                <h2>Your Cart is Empty</h2>
            </div>
        `;
        return;
    }

    let subtotal = cartItems.reduce(
        (sum, item) => sum + item.price * item.quantity,
        0
    );

    const tax = subtotal * 0.10;
    const shipping = subtotal > 0 ? 15 : 0;
    const total = subtotal + tax + shipping;

    const productsHTML = cartItems.map(item => `
        <div class="cart-card">

            <img class="product-image" src="${item.image}" alt="${item.title}" />

            <div class="product-info">
                <div class="product-title">${item.title}</div>
                <div class="product-category">${item.category}</div>
                <div class="product-price">$${item.price.toFixed(2)}</div>
            </div>

            <div class="actions">

                <div class="quantity-box">
                    <button onclick="changeQty(${item.id}, -1)">−</button>
                    <span>${item.quantity}</span>
                    <button onclick="changeQty(${item.id}, 1)">+</button>
                </div>

                <button class="remove-btn" onclick="removeItem(${item.id})">
                    Remove
                </button>

            </div>

        </div>
    `).join("");

    app.innerHTML = `
        <div class="cart-layout">

            <div class="cart-items">
                ${productsHTML}

                <button class="checkout-btn" onclick="clearCart()" style="background:var(--danger)">
                    Clear Cart
                </button>
            </div>

            <div class="summary">

                <h2>Order Summary</h2>

                <div class="summary-row">
                    <span>Items</span>
                    <span>${cartItems.length}</span>
                </div>

                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>$${subtotal.toFixed(2)}</span>
                </div>

                <div class="summary-row">
                    <span>Tax (10%)</span>
                    <span>$${tax.toFixed(2)}</span>
                </div>

                <div class="summary-row">
                    <span>Shipping</span>
                    <span>$${shipping.toFixed(2)}</span>
                </div>

                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span>$${total.toFixed(2)}</span>
                </div>

                <button class="checkout-btn">
                    Proceed to Checkout
                </button>

            </div>

        </div>
    `;
}

function changeQty(id, amount) {
    const item = cartItems.find(p => p.id === id);
    if (!item) return;

    item.quantity = Math.max(1, item.quantity + amount);
    saveCart();
    renderCart();
}

function removeItem(id) {
    cartItems = cartItems.filter(p => p.id !== id);
    saveCart();
    renderCart();
}

function clearCart() {
    cartItems = [];
    saveCart();
    renderCart();
}

loadProducts();
</script>

</body>
</html>
